# NTLSN — Netlify config. The site is a static, pre-built single-file artefact: there is
# no build step, so the "build" is a no-op and the repo root is published as-is.
# Functions live in netlify/functions and are bundled with esbuild (traces the shared
# helpers in netlify/lib). Node is pinned so `fetch`/`base64url` (Node 18+/15+) are always
# available and a platform default can't silently downgrade the runtime.

[build]
  # The site is static (no build step), but run the Functions test suite as the build command so a
  # failing test BLOCKS the deploy. GitHub Actions runs in parallel and does not gate Netlify, so
  # without this a function regression can ship to production before CI turns red (audit v2 config).
  command = "npm test"
  publish = "."

[build.environment]
  # Node 22 LTS. (Was 20 — EOL 2026-04-30. Code uses only fetch/base64url/node:test/crypto,
  # all supported on 22; tests run green on 22 locally.) Phase 3 #5.
  NODE_VERSION = "22"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  # @netlify/blobs is ESM and provided by the Functions runtime; keep it external so esbuild
  # leaves the dynamic import() in place instead of trying to inline it.
  external_node_modules = ["@netlify/blobs"]
