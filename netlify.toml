# NTLSN — Netlify config. The homepage is served by the /src rebuild (TASKS.md Epic 1,
# §1.3 cutover): scripts/build-src.sh compiles /src and places its output at the repo
# root (strangler-fig), so publish="." serves the rebuilt SPA homepage alongside the
# legacy standalone pages, feeds, data endpoints, and Netlify Functions. The legacy
# homepage is preserved as /legacy.html for rollback. Functions live in netlify/functions
# and are bundled with esbuild (traces the shared helpers in netlify/lib). Node is pinned
# so `fetch`/`base64url` (Node 18+/15+) are always available and a platform default
# can't silently downgrade the runtime.

[build]
  # Run the Functions test suite (a failure BLOCKS the deploy — GitHub Actions runs in
  # parallel and does not gate Netlify), then build the /src rebuild and place it at the
  # repo root via scripts/build-src.sh. publish="." serves the result as-is.
  command = "npm test && bash scripts/build-src.sh"
  publish = "."

[build.environment]
  # Node 22 LTS. (Was 20 — EOL 2026-04-30. Code uses only fetch/base64url/node:test/crypto,
  # all supported on 22; tests run green on 22 locally.) Phase 3 #5.
  NODE_VERSION = "22"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  # @netlify/blobs is ESM and provided by the Functions runtime; keep it external so esbuild
  # leaves the dynamic import() in place instead of trying to inline it.
  external_node_modules = ["@netlify/blobs"]

# Scheduled safety-net for the webhook's synchronous Zoom deauth wipe (Phase 3 #1). Every 5 min;
# the handler is bounded (MAX_PER_RUN accounts) so a long tail can't stall a single run. The sync
# wipe in netlify/functions/zoom-webhooks.js remains the GUARANTEED path — this only finishes
# tombstones left "pending" when that wipe times out on a large account.
[functions."zoom-deauth-sweep"]
  schedule = "*/5 * * * *"
