name: Weekly site health check

# Weekly quality sweep, Mondays 19:00 UTC. Goes RED (and writes to the run summary)
# on either:
#   - a confirmed-dead event link (404/410/DNS), or
#   - count drift: a displayed total in the static <head> that disagrees with the
#     canonical data files (e.g. hero "all 42 universities" while universities.json
#     has 43).
# Link bot-blocks (403/405/429) and Cloudflare-style challenges are treated as
# alive / inconclusive to avoid false alarms.

on:
  schedule:
    - cron: '0 19 * * 1'   # Mondays 19:00 UTC
  workflow_dispatch:

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Check event links
        run: node scripts/check-links.mjs
      - name: Check count drift
        run: node scripts/check-counts.mjs
