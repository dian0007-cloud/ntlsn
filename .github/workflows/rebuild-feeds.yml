name: Scheduled feed rebuild

# Regenerates the site's feed files (events.ics, feed.xml, events-ld.json,
# sitemap.xml) from data/events.json on a daily cron, and archives past events
# into data/archive-2026.json (TASKS.md 3.2) so the canonical events file stays
# lean and the feeds never surface stale entries. If any output changed, it
# commits and pushes ONLY those specific files back to main.
#
# *** THIS IS A NEW CAPABILITY — please review before merging. ***
# This is the only workflow in the repo that WRITES to main unattended. Reviewer
# notes:
#   - Credential: uses ONLY the default GITHUB_TOKEN granted to the job (via the
#     `permissions:` block below). No PAT, deploy key, or new secret is created,
#     requested, or referenced. To revoke, disable this workflow or drop the
#     `contents: write` permission — nothing else needs touching.
#   - Scope of writes: `git add` stages ONLY the six known output paths below
#     (events.ics, feed.xml, events-ld.json, sitemap.xml, data/events.json,
#     data/archive-2026.json). It is NEVER a blanket `git add -A`/`.`, so a cron
#     run cannot accidentally commit stray/untracked files from the runner.
#   - Failure mode: a rejected push (branch protection on main, or a non-fast-
#     forward from a concurrent commit) makes the job fail RED. It never
#     force-pushes (--force is never used) and never retries blindly.
#   - Loop avoidance: the commit message carries `[skip ci]`, so the push does
#     not re-trigger ci.yml's build-check on every run. (ci.yml also only builds
#     into /tmp and never pushes, so even without [skip ci] it would not loop.)
#   - Direct-to-main (no per-run PR) is deliberate: this workflow only ever
#     regenerates already-reviewed data mechanically; opening a PR for every
#     daily run would be noisy and low-value. The capability itself (the
#     workflow file you are reviewing now) is what gets human-reviewed here.

on:
  schedule:
    - cron: '0 1 * * *'    # daily 01:00 UTC (~11:00 AEST)
  workflow_dispatch:       # manual run from the Actions tab

permissions:
  contents: write          # job-scoped to THIS workflow; does not change repo-wide default token permissions

concurrency:
  group: rebuild-feeds
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Archive past events (TASKS.md 3.2)
        run: node scripts/archive-events.mjs

      - name: Rebuild feeds
        run: node scripts/build-feeds.mjs

      - name: Commit & push regenerated feeds (only if changed)
        run: |
          set -euo pipefail
          # The ONLY paths this job may ever commit. Keep this list explicit —
          # never replace with `git add -A` / `git add .`.
          PATHS="events.ics feed.xml events-ld.json sitemap.xml data/events.json data/archive-2026.json"
          # Short-circuit when nothing changed (typical mid-day run).
          if [ -z "$(git status --porcelain -- $PATHS)" ]; then
            echo "No feed/data changes — nothing to commit."
            exit 0
          fi
          git add -- $PATHS
          git config user.name  "ntlsn-bot"
          git config user.email "actions@github.com"
          git commit -m "chore: scheduled feed rebuild [skip ci]" \
                     -m "Auto-generated by the 'Scheduled feed rebuild' workflow (archive past events + regenerate feeds from data/events.json)."
          # Plain push only — a rejected push must surface as a red run.
          git push
