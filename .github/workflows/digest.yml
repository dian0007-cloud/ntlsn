name: Weekly sector digest

# Renders a "what's on" email from data/events.json every Monday 20:00 UTC (~6am AEST).
# Always uploads the HTML as a downloadable artifact. If the BUTTONDOWN_API_KEY secret
# is set (repo Settings → Secrets → Actions), it also sends the digest to your
# Buttondown subscribers. No secret = preview-only, nothing is sent.

on:
  schedule:
    - cron: '0 20 * * 1'   # Mondays 20:00 UTC
  workflow_dispatch:        # allow manual run from the Actions tab

jobs:
  digest:
    runs-on: ubuntu-latest
    env:
      # Job-level env so it can be read in the step `if` (the `secrets` context
      # is not allowed directly in `if`). Empty when the secret isn't set.
      BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Build digest
        run: node scripts/build-digest.mjs --days 14 --out digest.html
      - name: Upload digest artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: ntlsn-weekly-digest
          path: digest.html
      - name: Send via Buttondown (only if secret is set)
        if: ${{ env.BUTTONDOWN_API_KEY != '' }}
        run: |
          SUBJECT="NTLSN — what's on across the sector this fortnight"
          # Buttondown sends to all subscribers when an email is created (non-draft).
          jq -Rs --arg subject "$SUBJECT" '{subject:$subject, body:.}' digest.html \
            | curl -sS -X POST "https://api.buttondown.email/v1/emails" \
                -H "Authorization: Token $BUTTONDOWN_API_KEY" \
                -H "Content-Type: application/json" \
                --data-binary @- -o /dev/null -w "Buttondown send: HTTP %{http_code}\n"
